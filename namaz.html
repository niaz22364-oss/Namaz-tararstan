<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1a">
<title>Намаз Вакыты</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080d18;
    --card: #0e1628;
    --card2: #111b30;
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --green: #2ecc71;
    --text: #e8e4d8;
    --muted: #7a8499;
    --border: rgba(200,169,110,0.15);
    --glow: rgba(200,169,110,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rubik', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield background */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(200,169,110,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 20%, rgba(100,150,255,0.04) 0%, transparent 50%);
    pointer-events:none;
    z-index:0;
  }

  .stars {
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .star {
    position:absolute;
    background:#fff;
    border-radius:50%;
    animation: twinkle var(--d,3s) ease-in-out infinite;
    opacity:0;
  }
  @keyframes twinkle {
    0%,100%{opacity:0} 50%{opacity:var(--o,0.6)}
  }

  .app {
    position:relative;
    z-index:1;
    max-width:420px;
    margin:0 auto;
    padding:0 0 100px;
  }

  /* Header */
  .header {
    padding: 10px 16px 4px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
  }

  .header-left h1 {
    font-family:'Cinzel',serif;
    font-size:20px;
    letter-spacing:3px;
    color:var(--accent);
    text-transform:uppercase;
    opacity:0.8;
  }

  .header-left .hijri {
    font-size:11px;
    color:var(--muted);
    margin-top:3px;
    letter-spacing:1px;
  }

  .header-right {
    text-align:right;
  }

  .city-btn {
    background:none;
    border:1px solid var(--border);
    color:var(--accent);
    padding:6px 14px;
    border-radius:20px;
    font-size:12px;
    font-family:'Rubik',sans-serif;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    transition:all 0.3s;
  }
  .city-btn:active { opacity:0.7; }
  .city-btn svg { width:12px; height:12px; }

  /* Crescent decoration */
  .crescent-wrap {
    text-align:center;
    padding: 0;
    position:relative;
  }
  .crescent-svg {
    width:32px;
    height:32px;
    filter: drop-shadow(0 0 20px rgba(200,169,110,0.4));
    animation: moonFloat 6s ease-in-out infinite;
  }
  @keyframes moonFloat {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)}
  }

  /* Countdown */
  .countdown-card {
    margin:2px 16px;
    background: linear-gradient(135deg, #0e1a2e, #0a1220);
    border:1px solid var(--border);
    border-radius:16px;
    padding:12px 16px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .countdown-card::before {
    content:'';
    position:absolute;
    top:-30px; left:50%; transform:translateX(-50%);
    width:200px; height:100px;
    background:radial-gradient(ellipse, rgba(200,169,110,0.08), transparent 70%);
  }

  .next-label {
    font-size:10px;
    letter-spacing:2px;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:2px;
  }

  .next-name {
    font-family:'Cinzel',serif;
    font-size:16px;
    color:var(--accent2);
    margin-bottom:0;
  }

  .countdown-time {
    font-size:22px;
    font-weight:300;
    letter-spacing:1px;
    color:#fff;
    line-height:1.1;
    margin:0;
    font-family:'Rubik',sans-serif;
    font-variant-numeric:tabular-nums;
  }

  .countdown-sub {
    font-size:10px;
    color:var(--muted);
    letter-spacing:1px;
  }

  /* Progress bar */
  .progress-wrap {
    margin: 8px 16px 4px;
    height:2px;
    background:rgba(255,255,255,0.06);
    border-radius:2px;
    overflow:hidden;
  }
  .progress-bar {
    height:100%;
    background:linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius:2px;
    transition:width 1s linear;
    box-shadow:0 0 8px rgba(200,169,110,0.5);
  }

  /* Date strip */
  .date-strip {
    display:flex;
    justify-content:center;
    gap:4px;
    margin:12px 16px;
    overflow-x:auto;
    scrollbar-width:none;
    padding-bottom:4px;
  }
  .date-strip::-webkit-scrollbar { display:none; }

  .date-day {
    flex:0 0 auto;
    width:42px;
    height:62px;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border:1px solid transparent;
    transition:all 0.3s;
    background:rgba(255,255,255,0.03);
  }
  .date-day.active {
    background:linear-gradient(135deg, rgba(200,169,110,0.2), rgba(200,169,110,0.08));
    border-color:var(--border);
    width:52px;
  }
  .date-day .wd {
    font-size:9px;
    letter-spacing:1px;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:4px;
  }
  .date-day .dd {
    font-family:'Cinzel',serif;
    font-size:16px;
    color:var(--text);
  }
  .date-day.active .dd { color:var(--accent2); font-size:24px; }
  .date-day .dot {
    width:4px;height:4px;
    border-radius:50%;
    background:var(--accent);
    margin-top:4px;
    opacity:0;
  }
  .date-day.active .dot { opacity:1; }

  /* Prayer list */
  .prayers-card {
    margin:8px 16px;
    background: var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    overflow:hidden;
  }

  .prayer-item {
    display:flex;
    align-items:center;
    padding:4px 16px;
    border-bottom:1px solid rgba(255,255,255,0.04);
    transition:all 0.3s;
    position:relative;
    overflow:hidden;
  }
  .prayer-item:last-child { border-bottom:none; }

  .prayer-item.active {
    background:linear-gradient(90deg, rgba(200,169,110,0.1), transparent);
  }
  .prayer-item.active::before {
    content:'';
    position:absolute;
    left:0;top:0;bottom:0;
    width:3px;
    background:linear-gradient(180deg, var(--accent), var(--accent2));
    border-radius:0 2px 2px 0;
  }

  .prayer-item.passed {
    opacity:0.4;
  }

  .prayer-icon {
    width:28px;
    height:28px;
    border-radius:8px;
    background:rgba(255,255,255,0.04);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
    flex-shrink:0;
  }
  .prayer-item.active .prayer-icon {
    background:rgba(200,169,110,0.15);
  }

  .prayer-icon svg { width:14px; height:14px; }

  .prayer-info { flex:1; }
  .prayer-name {
    font-family:'Cinzel',serif;
    font-size:20px;
    color:var(--text);
    margin-bottom:0;
  }
  .prayer-item.active .prayer-name { color:var(--accent2); }
  .prayer-arabic {
    display:none;
  }

  .prayer-time {
    font-size:22px;
    font-weight:300;
    letter-spacing:2px;
    color:var(--text);
    font-variant-numeric:tabular-nums;
  }
  .prayer-item.active .prayer-time { color:var(--accent2); font-weight:500; }

  /* Info cards row */
  .info-row {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:10px 16px;
  }

  .info-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px;
  }

  .info-card .ic-label {
    font-size:10px;
    letter-spacing:2px;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .info-card .ic-value {
    font-family:'Cinzel',serif;
    font-size:18px;
    color:var(--accent2);
  }
  .info-card .ic-sub {
    font-size:10px;
    color:var(--muted);
    margin-top:2px;
  }

  /* Ramadan card */
  .ramadan-card {
    margin:10px 16px;
    background: linear-gradient(135deg, #0d1e35, #081525);
    border:1px solid rgba(200,169,110,0.2);
    border-radius:20px;
    padding:16px 20px;
    display:flex;
    align-items:center;
    gap:14px;
  }

  .ramadan-icon {
    font-size:32px;
    line-height:1;
  }

  .ramadan-text h3 {
    font-family:'Cinzel',serif;
    font-size:14px;
    color:var(--accent2);
    margin-bottom:3px;
  }
  .ramadan-text p {
    font-size:11px;
    color:var(--muted);
  }

  /* Iftar/Suhoor times */
  .fast-card {
    margin:10px 16px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:16px 20px;
  }

  .fast-title {
    font-size:11px;
    letter-spacing:2px;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:12px;
  }

  .fast-row {
    display:flex;
    justify-content:space-between;
  }

  .fast-item { text-align:center; }
  .fast-item .fi-label {
    font-size:11px;
    color:var(--muted);
    margin-bottom:4px;
  }
  .fast-item .fi-time {
    font-family:'Cinzel',serif;
    font-size:20px;
    color:var(--accent2);
  }
  .fast-item .fi-name {
    font-size:10px;
    color:var(--muted);
    margin-top:2px;
  }

  .fast-divider {
    width:1px;
    background:var(--border);
    margin:0 10px;
  }

  /* Bottom nav */
  .bottom-nav {
    position:fixed;
    bottom:0;left:0;right:0;
    z-index:10;
    background:rgba(8,13,24,0.95);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-around;
    padding:10px 0 calc(10px + env(safe-area-inset-bottom));
  }

  .nav-btn {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    background:none;
    border:none;
    color:var(--muted);
    font-family:'Rubik',sans-serif;
    font-size:10px;
    letter-spacing:0.5px;
    cursor:pointer;
    padding:0 16px;
    transition:color 0.3s;
  }
  .nav-btn.active { color:var(--accent); }
  .nav-btn svg { width:20px; height:20px; }

  /* Settings modal */
  .modal-overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(8px);
    z-index:100;
    align-items:flex-end;
  }
  .modal-overlay.open { display:flex; }

  .modal {
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:24px 24px 0 0;
    padding:24px 20px 40px;
    width:100%;
    max-width:420px;
    margin:0 auto;
    max-height:90vh;
    overflow-y:auto;
    animation:slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp {
    from{transform:translateY(100%)} to{transform:translateY(0)}
  }

  .modal h2 {
    font-family:'Cinzel',serif;
    font-size:16px;
    color:var(--accent);
    margin-bottom:20px;
    letter-spacing:2px;
    text-align:center;
  }

  .modal label {
    display:block;
    font-size:11px;
    letter-spacing:1.5px;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:6px;
    margin-top:14px;
  }

  .modal input, .modal select {
    width:100%;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 16px;
    color:var(--text);
    font-family:'Rubik',sans-serif;
    font-size:14px;
    outline:none;
    transition:border-color 0.3s;
  }
  .modal input:focus, .modal select:focus {
    border-color:rgba(200,169,110,0.4);
  }
  .modal select option { background:#0e1628; }

  .modal-btn {
    width:100%;
    margin-top:20px;
    padding:14px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    border:none;
    border-radius:14px;
    color:#0a0f1a;
    font-family:'Cinzel',serif;
    font-size:14px;
    font-weight:700;
    letter-spacing:2px;
    cursor:pointer;
    transition:opacity 0.3s;
  }
  .modal-btn:active { opacity:0.8; }

  .geo-btn {
    width:100%;
    margin-top:8px;
    padding:12px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border);
    border-radius:14px;
    color:var(--accent);
    font-family:'Rubik',sans-serif;
    font-size:13px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:all 0.3s;
  }
  .geo-btn:active { opacity:0.7; }

  .handle {
    width:40px;height:4px;
    background:rgba(255,255,255,0.15);
    border-radius:2px;
    margin:0 auto 20px;
  }

  /* Notifications toggle */
  .toggle-row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:16px;
    padding:12px 0;
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .toggle-label { font-size:13px; color:var(--text); }
  .toggle-sub { font-size:11px; color:var(--muted); margin-top:2px; }

  .toggle {
    width:44px;height:24px;
    background:rgba(255,255,255,0.1);
    border-radius:12px;
    position:relative;
    cursor:pointer;
    transition:background 0.3s;
    flex-shrink:0;
  }
  .toggle.on { background:var(--accent); }
  .toggle::after {
    content:'';
    position:absolute;
    width:18px;height:18px;
    background:#fff;
    border-radius:50%;
    top:3px;left:3px;
    transition:transform 0.3s;
    box-shadow:0 1px 4px rgba(0,0,0,0.3);
  }
  .toggle.on::after { transform:translateX(20px); }

  /* Qibla page */
  .page { display:none; padding-top:10px; }
  .page.active { display:block; }

  .qibla-wrap {
    margin:20px 16px;
    text-align:center;
  }
  .compass-outer {
    width:260px;height:260px;
    margin:0 auto 20px;
    position:relative;
  }
  .compass-ring {
    width:100%;height:100%;
    border-radius:50%;
    border:2px solid var(--border);
    position:absolute;
    top:0;left:0;
    background:radial-gradient(circle, #0e1628 60%, #0a1020);
    box-shadow:0 0 40px rgba(200,169,110,0.1), inset 0 0 40px rgba(0,0,0,0.5);
  }
  .compass-needle {
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%) rotate(0deg);
    transition:transform 1s cubic-bezier(0.34,1.56,0.64,1);
    width:8px;
    height:110px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .needle-north {
    width:0;height:0;
    border-left:4px solid transparent;
    border-right:4px solid transparent;
    border-bottom:55px solid var(--accent);
    flex-shrink:0;
  }
  .needle-south {
    width:0;height:0;
    border-left:4px solid transparent;
    border-right:4px solid transparent;
    border-top:55px solid rgba(255,255,255,0.2);
    flex-shrink:0;
  }
  .compass-center {
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:16px;height:16px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 10px rgba(200,169,110,0.5);
    z-index:2;
  }
  .compass-n {
    position:absolute;
    top:10px;left:50%;
    transform:translateX(-50%);
    font-family:'Cinzel',serif;
    font-size:12px;
    color:var(--accent);
  }
  .compass-s {
    position:absolute;
    bottom:10px;left:50%;
    transform:translateX(-50%);
    font-family:'Cinzel',serif;
    font-size:12px;
    color:var(--muted);
  }
  .compass-e {
    position:absolute;
    right:10px;top:50%;
    transform:translateY(-50%);
    font-family:'Cinzel',serif;
    font-size:12px;
    color:var(--muted);
  }
  .compass-w {
    position:absolute;
    left:10px;top:50%;
    transform:translateY(-50%);
    font-family:'Cinzel',serif;
    font-size:12px;
    color:var(--muted);
  }
  .qibla-angle {
    font-family:'Cinzel',serif;
    font-size:36px;
    color:var(--accent2);
    margin-bottom:6px;
  }
  .qibla-label {
    font-size:12px;
    color:var(--muted);
    letter-spacing:2px;
    text-transform:uppercase;
  }
  .start-compass-btn {
    margin-top:20px;
    padding:14px 40px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    border:none;
    border-radius:14px;
    color:#0a0f1a;
    font-family:'Cinzel',serif;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:2px;
  }

  /* Tasbih page */
  .tasbih-wrap {
    margin:20px 16px;
    text-align:center;
  }
  .tasbih-circle {
    width:200px;height:200px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--card2), var(--card));
    border:2px solid var(--border);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin:20px auto;
    cursor:pointer;
    transition:all 0.1s;
    box-shadow:0 0 40px rgba(200,169,110,0.1);
    user-select:none;
    -webkit-user-select:none;
  }
  .tasbih-circle:active {
    transform:scale(0.96);
    box-shadow:0 0 60px rgba(200,169,110,0.25);
  }
  .tasbih-count {
    font-family:'Cinzel',serif;
    font-size:56px;
    color:var(--accent2);
    line-height:1;
  }
  .tasbih-word {
    font-size:13px;
    color:var(--muted);
    margin-top:6px;
    font-family:serif;
    direction:rtl;
  }

  .tasbih-controls {
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:8px;
  }
  .tasbih-btn {
    padding:10px 24px;
    border-radius:12px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.04);
    color:var(--text);
    font-family:'Rubik',sans-serif;
    font-size:13px;
    cursor:pointer;
    transition:all 0.3s;
  }
  .tasbih-btn:active { opacity:0.7; }

  .tasbih-dhikr {
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:16px;
    padding:0 16px;
  }
  .dhikr-chip {
    padding:8px 16px;
    border-radius:20px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.03);
    color:var(--muted);
    font-size:12px;
    cursor:pointer;
    font-family:serif;
    direction:rtl;
    transition:all 0.3s;
  }
  .dhikr-chip.active {
    background:rgba(200,169,110,0.12);
    color:var(--accent);
    border-color:rgba(200,169,110,0.3);
  }

  /* Section title */
  .section-title {
    display:none;
  }

  .method-info {
    text-align:center;
    font-size:11px;
    color:var(--muted);
    margin:0 16px 10px;
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.02);
  }

  .city-chip {
    padding:8px 4px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.03);
    color:var(--text);
    font-size:11px;
    text-align:center;
    cursor:pointer;
    transition:all 0.2s;
    font-family:'Rubik',sans-serif;
    line-height:1.3;
  }
  .city-chip:active, .city-chip.selected {
    background:rgba(200,169,110,0.15);
    color:var(--accent2);
    border-color:rgba(200,169,110,0.35);

function filterCities(q){

async function geocodeCity(){
  const name=document.getElementById('inputCity').value.trim();
  if(!name){return;}
  const status=document.getElementById('geocodeStatus');
  status.style.color='var(--accent)';
  status.textContent='Ищу координаты...';
  try{
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name)}&format=json&limit=1&accept-language=ru`;
    const res=await fetch(url,{headers:{'User-Agent':'NamazApp/1.0'}});
    const data=await res.json();
    if(data&&data.length>0){
      const lat=parseFloat(data[0].lat).toFixed(4);
      const lon=parseFloat(data[0].lon).toFixed(4);
      const displayName=data[0].display_name.split(',')[0];
      document.getElementById('inputLat').value=lat;
      document.getElementById('inputLon').value=lon;
      document.getElementById('inputCity').value=displayName||name;
      status.style.color='var(--green)';
      status.textContent=`✓ Найдено: ${displayName} (${lat}, ${lon})`;
    } else {
      status.style.color='#e74c3c';
      status.textContent='Город не найден. Проверьте название.';
    }
  } catch(e){
    status.style.color='#e74c3c';
    status.textContent='Нет интернета. Введите координаты вручную.';
  }
}

}

// ===== PRAYER CALCULATION (Adhan.js algorithm) =====
const METHODS = {
  MWL:    { fajrAngle:18, ishaAngle:17 },
  ISNA:   { fajrAngle:15, ishaAngle:15 },
  Egypt:  { fajrAngle:19.5, ishaAngle:17.5 },
  Makkah: { fajrAngle:18.5, ishaMinutes:90 },
  Karachi:{ fajrAngle:18, ishaAngle:18 },
  Tehran: { fajrAngle:17.7, ishaAngle:14, maghribAngle:4.5 },
  Jafari: { fajrAngle:16, ishaAngle:14, maghribAngle:4 },
  DUMRF:  { fajrAngle:18, ishaAngle:18 },
  DUMRT:  { fajrAngle:18, ishaAngle:15 },
};

function toRad(d){ return d*Math.PI/180; }
function toDeg(r){ return r*180/Math.PI; }
function fixAngle(a){ return a%360<0?a%360+360:a%360; }
function fixHour(h){ return h%24<0?h%24+24:h%24; }

function julianDate(y,m,d){
  if(m<=2){y--;m+=12;}
  const A=Math.floor(y/100), B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5;
}

function sunPosition(jd){
  const D=jd-2451545.0;
  const g=fixAngle(357.529+0.98560028*D);
  const q=fixAngle(280.459+0.98564736*D);
  const L=fixAngle(q+1.915*Math.sin(toRad(g))+0.020*Math.sin(toRad(2*g)));
  const e=23.439-0.00000036*D;
  const RA=fixHour(toDeg(Math.atan2(Math.cos(toRad(e))*Math.sin(toRad(L)),Math.cos(toRad(L))))/15);
  const d=toDeg(Math.asin(Math.sin(toRad(e))*Math.sin(toRad(L))));
  const EqT=q/15-RA;
  return {d,EqT};
}

// timeDiff: hour angle for given elevation angle (degrees)
// Uses praytimes.org formula: sin(angle) not cos(90+angle)
function timeDiff(angle, lat, dec){
  const cosT = (Math.sin(toRad(angle)) - Math.sin(toRad(lat))*Math.sin(toRad(dec)))
             / (Math.cos(toRad(lat)) * Math.cos(toRad(dec)));
  if(cosT >= 1) return 0;
  if(cosT <= -1) return 12;
  return toDeg(Math.acos(cosT)) / 15;
}

function calcPrayers(date, lat, lon, method, madhab){
  const m = METHODS[method] || METHODS.MWL;
  const y = date.getFullYear(), mo = date.getMonth()+1, d = date.getDate();
  const tz = -date.getTimezoneOffset() / 60;
  const jd = julianDate(y, mo, d);
  const {d: dec, EqT} = sunPosition(jd + (12 - lon/15) / 24);

  const noonUTC = 12 - lon/15 - EqT;
  const noon = noonUTC + tz;

  const sunrise = noon - timeDiff(-0.8333, lat, dec);
  const sunset  = noon + timeDiff(-0.8333, lat, dec);

  // DUMRT northern latitude method:
  // Fajr: astronomical if sun reaches -18° (cosF > -1.0), else sunrise - 2h
  // Isha:  astronomical if sun reaches -15° sufficiently (cosI > -0.89), else sunset + 1.5h
  // This is year-independent and physically justified for lat ~56°
  const cosF = (Math.sin(toRad(-(m.fajrAngle || 18))) - Math.sin(toRad(lat)) * Math.sin(toRad(dec)))
             / (Math.cos(toRad(lat)) * Math.cos(toRad(dec)));
  const cosI = (Math.sin(toRad(-(m.ishaAngle  || 17))) - Math.sin(toRad(lat)) * Math.sin(toRad(dec)))
             / (Math.cos(toRad(lat)) * Math.cos(toRad(dec)));

  const fajr = cosF > -1.0
    ? noon - timeDiff(-(m.fajrAngle || 18), lat, dec)
    : sunrise - 2.0;

  const isha = m.ishaMinutes
    ? sunset + m.ishaMinutes / 60
    : cosI > -0.89
      ? noon + timeDiff(-(m.ishaAngle || 17), lat, dec)
      : sunset + 1.5;

  const sf = madhab === 'hanafi' ? 2 : 1;
  const asrElev = toDeg(Math.atan(1 / (sf + Math.tan(toRad(Math.abs(lat - dec))))));
  const asr = noon + timeDiff(asrElev, lat, dec);

  const maghrib = m.maghribAngle
    ? noon + timeDiff(-m.maghribAngle, lat, dec)
    : sunset;

  // DUMRT: Dhuhr = 12:00 if zenith is before noon, else zenith time
  const zenithTime = hmCeil(noon);
  const dhuhr = zenithTime.total > 720
    ? zenithTime
    : { h: 12, m: 0, total: 720 };

  function hmCeil(h){
    const totalMin = Math.ceil(h * 60);
    const h24 = ((totalMin / 60) % 24 + 24) % 24;
    return { h: Math.floor(h24), m: Math.floor((h24 % 1) * 60), total: Math.floor(h24 * 60) };
  }

  return {
    fajr:    hmCeil(fajr),
    masjid:  hmCeil(Math.max(fajr + 0.25, sunrise - 1.5)),
    sunrise: hmCeil(sunrise),
    zenith:  hmCeil(noon),
    dhuhr:   dhuhr,
    asr:     hmCeil(asr),
    maghrib: hmCeil(maghrib),
    isha:    hmCeil(isha),
  };
}

function fmt(t){ return String(t.h).padStart(2,'0')+':'+String(t.m).padStart(2,'0'); }

// ===== HIJRI DATE =====
function toHijri(date){
  let gy=date.getFullYear(), gm=date.getMonth()+1, gd=date.getDate();
  if(gm<=2){gy--;gm+=12;}
  const A=Math.floor(gy/100);
  const B=2-A+Math.floor(A/4);
  const JD=Math.floor(365.25*(gy+4716))+Math.floor(30.6001*(gm+1))+gd+B-1524;
  let l=JD-1948440+10632;
  const n=Math.floor((l-1)/10631);
  l=l-10631*n+354;
  const j=Math.floor((10985-l)/5316)*Math.floor(50*l/17719)+
           Math.floor(l/5670)*Math.floor(43*l/15238);
  l=l-Math.floor((30-j)/15)*Math.floor(17719*j/50)-
      Math.floor(j/16)*Math.floor(15238*j/43)+29;
  const month=Math.floor(24*l/709);
  const day=l-Math.floor(709*month/24);
  const year=30*n+j-30;
  const hMonths=['Мухаррам','Сафар','Раби аль-Авваль','Раби ас-Сани','Джумада аль-Уля','Джумада ас-Сани','Раджаб','Шаабан','Рамадан','Шавваль','Зуль-Каада','Зуль-Хиджа'];
  return `${day} ${hMonths[month-1]} ${year}`;
}

// ===== DATE STRIP =====
function buildDateStrip(selectedDate){
  const strip=document.getElementById('dateStrip');
  strip.innerHTML='';
  const days=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const today=new Date();
  for(let i=-2;i<=4;i++){
    const d=new Date(today);
    d.setDate(today.getDate()+i);
    const div=document.createElement('div');
    div.className='date-day'+(i===0?' active':'');
    div.innerHTML=`<span class="wd">${days[d.getDay()]}</span><span class="dd">${d.getDate()}</span><div class="dot"></div>`;
    div.onclick=(()=>{
      const dt=new Date(d);
      return ()=>{
        document.querySelectorAll('.date-day').forEach(x=>x.classList.remove('active'));
        div.classList.add('active');
        selectedDate=dt;
        renderPrayers(dt);
      };
    })();
    strip.appendChild(div);
  }
}

// ===== PRAYERS LIST =====
const PRAYER_NAMES=[
  {key:'fajr',   name:'Фаджр',   ar:'الفجر'},
  {key:'masjid', name:'В мечети',ar:'جماعة'},
  {key:'sunrise',name:'Восход',  ar:'الشروق'},
  {key:'zenith', name:'Зенит',   ar:'الزوال', muted:true},
  {key:'dhuhr',  name:'Зухр',    ar:'الظهر'},
  {key:'asr',    name:'Аср',     ar:'العصر'},
  {key:'maghrib',name:'Магриб',  ar:'المغرب'},
  {key:'isha',   name:'Иша',     ar:'العشاء'},
];

function renderPrayers(date){
  const {lat,lon,method,madhab,city}=settings;
  if(!lat||!lon){ return; }

  document.getElementById('cityName').textContent=city||'Город';
  document.getElementById('headerCity').textContent=city||'Намаз';
  document.getElementById('hijriDate').textContent=toHijri(date);
  const days=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  document.getElementById('gregDate').textContent=`${days[date.getDay()]}, ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}г.`;

  const t=calcPrayers(date,lat,lon,method||'MWL',madhab||'standard');

  document.getElementById('fastStart').textContent=fmt(t.fajr);
  document.getElementById('fastEnd').textContent=fmt(t.maghrib);

  // Ураза-байрам 2026 — 20 марта
  const eid = new Date('2026-03-20');
  const today = new Date();
  today.setHours(0,0,0,0);
  eid.setHours(0,0,0,0);
  const daysLeft = Math.ceil((eid - today) / (1000*60*60*24));
  const eidEl = document.getElementById('eidCountdown');
  if(daysLeft > 0){
    eidEl.textContent = `до Ураза-байрам ${daysLeft} дн.`;
  } else if(daysLeft === 0){
    eidEl.textContent = '🌙 Ураза-байрам сегодня!';
  } else {
    eidEl.textContent = '';
  }

  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const isToday=date.toDateString()===now.toDateString();

  const list=document.getElementById('prayersList');
  list.innerHTML='';

  const times=[t.fajr,t.masjid,t.sunrise,t.zenith,t.dhuhr,t.asr,t.maghrib,t.isha];

  PRAYER_NAMES.forEach((p,i)=>{
    const ti=times[i];
    const min=ti.total;
    const passed=isToday&&nowMin>min;
    const nextIdx=getNextPrayerIndex(times,nowMin);
    const active=isToday&&i===nextIdx&&!p.muted;

    // Скрываем зенит если он после 12:00 (зухр берёт его время)
    if(p.muted && ti.total > 720) return;

    const div=document.createElement('div');
    div.className='prayer-item'+(active?' active':passed?' passed':'');
    if(p.muted) div.style.cssText='opacity:0.45;padding:2px 16px;';

    div.innerHTML=`
      <div class="prayer-info">
        <div class="prayer-name" style="${p.muted?'font-size:14px':''}">${p.name}</div>
      </div>
      <div class="prayer-time" style="${p.muted?'font-size:16px':''}">${fmt(ti)}</div>
    `;
    list.appendChild(div);
  });

  if(isToday){
    const now2=new Date();
    const nowMinSec=now2.getHours()*60+now2.getMinutes()+now2.getSeconds()/60;
    updateCountdown(times,nowMinSec);
  }
}

function getCurrentPrayer(times,nowMin){
  const mins=times.map(t=>t.total);
  let cur=-1;
  for(let i=0;i<mins.length;i++){
    if(nowMin>=mins[i]) cur=i;
  }
  return cur;
}

function getNextPrayerIndex(times,nowMin){
  for(let i=0;i<times.length;i++){
    if(times[i]&&nowMin<times[i].total) return i;
  }
  return 0;
}

function getNextPrayer(times,nowMin){
  const prayers=['Фаджр','В мечети','Восход','Зенит','Зухр','Аср','Магриб','Иша'];
  const skipForCountdown=[false,false,false,true,false,false,false,false]; // skip zenith
  for(let i=0;i<times.length;i++){
    if(times[i]&&nowMin<times[i].total&&!skipForCountdown[i]) return{name:prayers[i],time:times[i]};
  }
  return{name:'Фаджр',time:{...times[0],total:times[0].total+1440}};
}

function updateCountdown(times,nowMin){
  const next=getNextPrayer(times,nowMin);
  let diff=Math.floor((next.time.total-nowMin)*60);
  if(diff<0) diff+=86400;
  const h=Math.floor(diff/3600), m=Math.floor((diff%3600)/60), s=Math.floor(diff%60);
  const timeStr=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  document.getElementById('nextName').textContent=next.name;
  document.getElementById('countdownTime').textContent=timeStr;

  // Progress between current and next
  const cur=getCurrentPrayer(times,nowMin);
  if(cur>=0){
    const from=times[cur].total, to=next.time.total;
    const pct=Math.min(100,Math.max(0,(nowMin-from)/(to-from)*100));
    document.getElementById('progressBar').style.width=pct+'%';
  }
}

// ===== LIVE CLOCK =====
function tick(){
  if(!settings.lat||!settings.lon) return;
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  try {
    const t=calcPrayers(now,settings.lat,settings.lon,settings.method||'MWL',settings.madhab||'standard');
    const times=[t.fajr,t.masjid,t.sunrise,t.zenith,t.dhuhr,t.asr,t.maghrib,t.isha];
    if(times.every(x=>x&&typeof x.total==='number')) updateCountdown(times,nowMin);
  } catch(e){ console.warn('tick error:', e); }
}

// ===== QIBLA (по солнцу) =====
function startQibla(){
  if(!settings.lat){alert('Сначала укажите координаты'); return;}

  const lat=settings.lat, lon=settings.lon;

  // Азимут Каабы
  const kaabaLat=21.4225, kaabaLon=39.8262;
  const dLon=toRad(kaabaLon-lon);
  const y=Math.sin(dLon)*Math.cos(toRad(kaabaLat));
  const x=Math.cos(toRad(lat))*Math.sin(toRad(kaabaLat))-
          Math.sin(toRad(lat))*Math.cos(toRad(kaabaLat))*Math.cos(dLon);
  const qibla=((toDeg(Math.atan2(y,x))+360)%360);
  document.getElementById('qiblaAngle').textContent=Math.round(qibla)+'°';

  // Азимут солнца прямо сейчас
  const now=new Date();
  const {az:sunAz, alt:sunAlt}=getSunAzimuth(now,lat,lon);

  // Проверяем — солнце над горизонтом?
  const instr=document.getElementById('qiblaInstruction');

  // Кааба всегда на своём месте — юг сверху, запад справа (зеркально от обычного)
  // 198° от севера = 18° западнее юга = 18° правее центра (на юг-сверху компасе запад справа)
  const kaabaDeg = (qibla - 180 + 360) % 360;
  document.getElementById('kaabaMarker').style.transform=
    `rotate(${kaabaDeg}deg) translateY(-90px) rotate(${-kaabaDeg}deg)`;

  if(sunAlt<=0){
    document.getElementById('sunAngleDisplay').textContent='--°';
    document.getElementById('turnAngle').textContent='--°';
    document.getElementById('sunMarker').style.opacity='0.2';
    instr.innerHTML=`<span style="color:var(--muted)">🌙 Солнце за горизонтом<br>Определить направление по солнцу невозможно</span>`;
    clearInterval(window._qiblaInterval);
    window._qiblaInterval=setInterval(()=>startQibla(),60000);
    return;
  }

  document.getElementById('sunMarker').style.opacity='1';
  document.getElementById('sunAngleDisplay').textContent=Math.round(sunAz)+'°';

  // Разница: на сколько повернуться от солнца к кибле
  let turn=(qibla-sunAz+360)%360;
  if(turn>180) turn=turn-360;
  const turnAbs=Math.abs(Math.round(turn));
  const dir=turn>0?'вправо':'влево';
  document.getElementById('turnAngle').textContent=(turn>0?'+':'')+Math.round(turn)+'°';

  // Позиционируем иконки по реальным азимутам (юг сверху, запад справа — зеркально)
  const sunDegReal = (sunAz - 180 + 360) % 360;
  document.getElementById('sunMarker').style.transform=
    `rotate(${sunDegReal}deg) translateY(-90px) rotate(${-sunDegReal}deg)`;

  // Инструкция
  if(turnAbs<=5){
    instr.innerHTML=`<span style="color:var(--accent2)">✅ Встань лицом к солнцу — это и есть направление киблы!</span>`;
  } else {
    instr.innerHTML=`🕋 Кибла: <b style="color:var(--accent2)">${Math.round(qibla)}°</b> от севера<br>
    Встань лицом к солнцу ☀️, повернись на <b style="color:var(--accent2)">${turnAbs}° ${dir}</b>`;
  }

  // Обновляем каждую минуту
  clearInterval(window._qiblaInterval);
  window._qiblaInterval=setInterval(()=>startQibla(),60000);
}

function getSunAzimuth(date, lat, lon){
  const tz=-date.getTimezoneOffset()/60;
  const y=date.getFullYear(),mo=date.getMonth()+1,d=date.getDate();
  const jd=julianDate(y,mo,d);
  const {d:dec,EqT}=sunPosition(jd+(12-lon/15)/24);
  const noonUTC=12-lon/15-EqT;
  const noon=noonUTC+tz;

  const h=date.getHours()+date.getMinutes()/60+date.getSeconds()/3600;
  const hourAngle=(h-noon)*15;

  // Высота солнца
  const sinAlt=Math.sin(toRad(lat))*Math.sin(toRad(dec))+
               Math.cos(toRad(lat))*Math.cos(toRad(dec))*Math.cos(toRad(hourAngle));
  const alt=toDeg(Math.asin(Math.min(1,Math.max(-1,sinAlt))));

  // Азимут через atan2 (север=0°, восток=90°)
  const x=Math.sin(toRad(hourAngle));
  const yy=Math.sin(toRad(lat))*Math.cos(toRad(hourAngle))-Math.cos(toRad(lat))*Math.tan(toRad(dec));
  const az=(toDeg(Math.atan2(x,yy))+180+360)%360;

  return {az, alt};
}

// ===== TASBIH =====
let tasbihCount=0, tasbihGoal=33, tasbihText='سُبْحَانَ ٱللَّٰهِ';

function setDhikr(text,name,goal,el){
  tasbihText=text;
  tasbihGoal=goal;
  tasbihCount=0;
  document.getElementById('tasbihCount').textContent='0';
  document.getElementById('tasbihWord').textContent=text;
  document.getElementById('tasbihGoal').textContent=goal;
  document.querySelectorAll('.dhikr-chip').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
}

function tasbihTap(){
  tasbihCount++;
  document.getElementById('tasbihCount').textContent=tasbihCount;
  if(tasbihCount===tasbihGoal){
    const c=document.getElementById('tasbihCircle');
    c.style.boxShadow='0 0 80px rgba(200,169,110,0.4)';
    setTimeout(()=>c.style.boxShadow='0 0 40px rgba(200,169,110,0.1)',600);
    if(navigator.vibrate) navigator.vibrate([50,50,100]);
  } else {
    if(navigator.vibrate) navigator.vibrate(20);
  }
}

function tasbihUndo(){
  if(tasbihCount>0){ tasbihCount--; document.getElementById('tasbihCount').textContent=tasbihCount; }
}

function tasbihReset(){
  tasbihCount=0;
  document.getElementById('tasbihCount').textContent='0';
}

// ===== INIT =====
function init(){
  const today=new Date();
  buildDateStrip(today);
  renderPrayers(today);
  clearInterval(window._tickInterval);
  window._tickInterval=setInterval(tick,1000);
  tick();
}

init();

}
